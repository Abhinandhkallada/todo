<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f3f3f3;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:500px;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        .add-task{
            display:flex;
            gap:10px;
            margin-bottom:20px;
        }

        .add-task a{
            text-decoration:none;
        }

        .add-btn{
            background:#000;
            color:#fff;
            padding:10px 18px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .task-card{
            background:#fff;
            padding:15px;
            border-radius:8px;
            margin-bottom:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 8px rgba(0,0,0,.15);
        }

        .task-info h3{
            margin-bottom:5px;
        }

        .task-info p{
            color:gray;
            font-size:14px;
        }

        .actions{
            display:flex;
            gap:10px;
        }

        .actions a{
            text-decoration:none;
            color:white;
        }

        .update{
            background:#0d6efd;
            padding:8px 15px;
            border-radius:5px;
        }

        .delete{
            background:#dc3545;
            padding:8px 15px;
            border-radius:5px;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            margin-bottom:15px;
            color:gray;
            font-size:14px;
        }

        .footer{
            text-align:center;
            margin-top:30px;
            color:gray;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>My Tasks</h1>

    <div class="add-task">
        <a href="{% url 'addtask' %}">
            <button class="add-btn">+ Add Task</button>
        </a>
    </div>

    <div class="top-bar">
        <span>All Tasks</span>
        <span>{{ todos|length }} Tasks</span>
    </div>

    {% for i in todos %}

    <div class="task-card">

        <div class="task-info">
            <h3>{{ i.taskname }}</h3>
            <p>{{ i.date }}</p>
        </div>

        <div class="actions">
            <a class="update" href="{% url 'update' i.id %}">Update</a>

            <a class="delete" href="{% url 'delete' i.id %}">Delete</a>
        </div>

    </div>

    {% empty %}

    <div class="task-card">
        <p>No tasks available.</p>
    </div>

    {% endfor %}

    <div class="footer">
        &copy; 
    </div>

</div>

</body>
</html>
