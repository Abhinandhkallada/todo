<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>todo app</h1>
    <button><a href="{% url 'addtask' %}">Add task</a></button>
    {% for i in todos %}
        <p>{{i.taskname}}</p>
        <p>{{i.date}}</p>
        <button><a href="{% url 'delete' i.id %}">Delete</a></button>
        <button><a href="{% url 'update' i.id %}">update</a></button>
    {% endfor %}
    
</body>
</html>
